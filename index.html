<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พยากรณ์อากาศ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 1.2s ease;
            color: white;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
            text-align: center;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.25);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-sub {
            font-size: 13px;
            opacity: 0.65;
        }

        .error-box {
            background: rgba(255,50,50,0.18);
            border: 1px solid rgba(255,80,80,0.35);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            max-width: 320px;
        }

        .error-box p { margin-top: 8px; font-size: 14px; opacity: 0.8; }

        /* Header */
        .header {
            text-align: center;
            padding: 10px 0 20px;
        }

        .location-name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .date-line {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* Current card */
        .glass {
            background: rgba(255,255,255,0.14);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 24px;
        }

        .current-card {
            padding: 28px 24px 22px;
            text-align: center;
            margin-bottom: 14px;
        }

        .wx-icon {
            font-size: 82px;
            display: block;
            margin-bottom: 6px;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }

        .temp-display {
            font-size: 76px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
        }

        .temp-display sup {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 0;
            vertical-align: super;
        }

        .wx-label {
            font-size: 17px;
            margin: 6px 0 2px;
            opacity: 0.9;
        }

        .feels {
            font-size: 13px;
            opacity: 0.65;
            margin-bottom: 22px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 12px 10px;
        }

        .stat-icon { font-size: 18px; }
        .stat-val { font-size: 17px; font-weight: 600; margin: 2px 0; }
        .stat-lbl { font-size: 11px; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.4px; }

        /* Section title */
        .section-title {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 18px 0 10px 2px;
        }

        /* Hourly */
        .hourly-scroll {
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.35) transparent;
            margin-bottom: 4px;
        }

        .hourly-scroll::-webkit-scrollbar { height: 4px; }
        .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
        .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.35); border-radius: 2px; }
        .hourly-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.6); }

        .hourly-row {
            display: flex;
            gap: 9px;
            padding-bottom: 4px;
        }

        .h-item {
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 16px;
            padding: 13px 10px;
            text-align: center;
            min-width: 80px;
            flex-shrink: 0;
        }

        .h-item.now {
            background: rgba(255,255,255,0.28);
            border-color: rgba(255,255,255,0.5);
        }

        .h-time { font-size: 12px; opacity: 0.75; margin-bottom: 5px; }
        .h-icon { font-size: 22px; margin-bottom: 3px; }
        .h-desc { font-size: 10px; opacity: 0.75; margin-bottom: 3px; line-height: 1.2; }
        .h-temp { font-size: 15px; font-weight: 600; }
        .h-rain { font-size: 11px; opacity: 0.90; margin-top: 3px; font-weight: 600; }

        /* Daily */
        .daily-card {
            border-radius: 22px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .d-item {
            display: flex;
            align-items: center;
            padding: 13px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.09);
            gap: 4px;
        }

        .d-item:last-child { border-bottom: none; }

        .d-day { width: 58px; font-size: 14px; font-weight: 600; }
        .d-icon { font-size: 24px; margin: 0 10px; }

        .d-rainbar {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bar-bg {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.18);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #74b9ff;
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        .d-rain-pct { font-size: 13px; opacity: 0.90; min-width: 50px; text-align: right; font-weight: 600; }

        .d-temps { text-align: right; min-width: 72px; }
        .d-hi { font-size: 15px; font-weight: 700; }
        .d-lo { font-size: 13px; opacity: 0.55; }

        /* Extra cards */
        .extras-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .extra-card {
            border-radius: 20px;
            padding: 18px;
        }

        .ex-title { font-size: 12px; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .ex-val { font-size: 28px; font-weight: 700; }
        .ex-sub { font-size: 12px; opacity: 0.65; margin-top: 2px; }

        .uv-bar {
            height: 6px;
            background: linear-gradient(to right, #00b894, #fdcb6e, #e17055, #d63031, #6c5ce7);
            border-radius: 3px;
            margin-top: 10px;
            position: relative;
        }

        .uv-dot {
            position: absolute;
            top: -3px;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .sun-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .sun-item { text-align: center; }
        .sun-time { font-size: 18px; font-weight: 600; }
        .sun-lbl { font-size: 11px; opacity: 0.6; margin-top: 2px; }

        /* Model badge */
        .model-badge {
            text-align: center;
            font-size: 11px;
            opacity: 0.45;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }

        /* Refresh button */
        .refresh-btn {
            display: block;
            width: 100%;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            border-radius: 14px;
            padding: 13px;
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .refresh-btn:hover { background: rgba(255,255,255,0.25); }
        .refresh-btn:active { background: rgba(255,255,255,0.35); }

        /* Clickable daily rows */
        .d-item { cursor: pointer; transition: background 0.15s; }
        .d-item:hover { background: rgba(255,255,255,0.06); }
        .d-item.open  { background: rgba(255,255,255,0.08); }
        .d-item:last-child { border-bottom: none; }

        .d-chevron {
            font-size: 16px;
            opacity: 0.32;
            margin-left: 4px;
            transition: transform 0.28s, opacity 0.2s;
            line-height: 1;
            flex-shrink: 0;
        }
        .d-item.open .d-chevron { transform: rotate(90deg); opacity: 0.65; }

        /* Expand container */
        .d-expand {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.38s ease;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .d-expand.open { max-height: 195px; }

        /* Hourly cards inside expand */
        .dh-scroll {
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
            padding: 10px 14px 8px;
        }

        .dh-scroll::-webkit-scrollbar { height: 3px; }
        .dh-scroll::-webkit-scrollbar-track { background: transparent; }
        .dh-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }
        .dh-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.55); }

        .dh-row { display: flex; gap: 8px; }

        .dh-item {
            background: rgba(255,255,255,0.09);
            border-radius: 12px;
            padding: 9px 8px;
            text-align: center;
            min-width: 56px;
            flex-shrink: 0;
        }
        .dh-item.current-h {
            background: rgba(255,255,255,0.24);
            border: 1px solid rgba(255,255,255,0.35);
        }

        .dh-time { font-size: 10px; opacity: 0.62; margin-bottom: 3px; }
        .dh-icon { font-size: 17px; margin-bottom: 3px; }
        .dh-temp { font-size: 14px; font-weight: 600; }
        .dh-rain { font-size: 10px; opacity: 0.6; margin-top: 3px; }
        .dh-wind { font-size: 10px; opacity: 0.5; margin-top: 2px; }
        .dh-hum  { font-size: 10px; opacity: 0.5; margin-top: 2px; }

        /* Settings button */
        .settings-btn {
            position: fixed;
            top: 14px;
            right: 14px;
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            z-index: 100;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.32); transform: rotate(30deg); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal-card {
            background: rgba(15,15,42,0.94);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 24px;
            padding: 26px 22px 20px;
            width: 100%;
            max-width: 340px;
            transform: translateY(24px);
            transition: transform 0.25s;
        }
        .modal-overlay.open .modal-card { transform: translateY(0); }

        .modal-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 16px; }

        .modal-label { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }

        .modal-input {
            width: 100%;
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 11px;
            padding: 11px 12px;
            font-size: 15px;
            color: white;
            font-family: 'Sarabun', sans-serif;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: rgba(255,255,255,0.44); }
        .modal-input::placeholder { opacity: 0.3; color: white; }

        .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .modal-btn {
            display: block;
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 8px;
            text-align: center;
        }
        .modal-btn-save {
            background: rgba(255,255,255,0.92);
            color: #0f0f2e;
            border: none;
            font-weight: 700;
            font-size: 15px;
        }
        .modal-btn-save:hover { background: white; }
        .modal-btn-gps {
            background: rgba(255,255,255,0.09);
            color: white;
            border: 1px solid rgba(255,255,255,0.18);
        }
        .modal-btn-gps:hover { background: rgba(255,255,255,0.18); }
        .modal-btn-cancel {
            background: transparent;
            color: rgba(255,255,255,0.42);
            border: none;
            font-size: 13px;
            margin-bottom: 0;
        }

        .modal-divider { text-align: center; font-size: 12px; opacity: 0.28; margin: 2px 0 10px; }

        .saved-badge {
            background: rgba(0,230,118,0.12);
            border: 1px solid rgba(0,230,118,0.2);
            border-radius: 10px;
            padding: 7px 10px;
            font-size: 12px;
            color: #69f0ae;
            text-align: center;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>กำลังระบุตำแหน่ง...</p>
        <p class="loading-sub">กรุณาอนุญาตการเข้าถึง GPS</p>
    </div>

    <div id="content" style="display:none"></div>
</div>

<button class="settings-btn" onclick="openModal()" title="ตั้งค่าพิกัด">⚙️</button>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
    <div class="modal-card">
        <div class="modal-title">📍 ตั้งค่าพิกัดสถานที่</div>
        <div id="saved-badge" class="saved-badge" style="display:none"></div>
        <div class="modal-row">
            <div>
                <div class="modal-label">Latitude</div>
                <input class="modal-input" id="inp-lat" type="number" step="any" min="-90" max="90" placeholder="เช่น 15.2308">
            </div>
            <div>
                <div class="modal-label">Longitude</div>
                <input class="modal-input" id="inp-lon" type="number" step="any" min="-180" max="180" placeholder="เช่น 104.8236">
            </div>
        </div>
        <div class="modal-label">ชื่อสถานที่ (ไม่บังคับ)</div>
        <input class="modal-input" id="inp-name" type="text" placeholder="เช่น บ้าน, ร้าน, หอ">
        <button class="modal-btn modal-btn-save" onclick="saveAndLoad()">บันทึกและโหลดอากาศ</button>
        <div class="modal-divider">— หรือ —</div>
        <button class="modal-btn modal-btn-gps" onclick="useGPS()">📡 ใช้ GPS ตำแหน่งปัจจุบัน</button>
        <button class="modal-btn modal-btn-cancel" onclick="closeModal()">ยกเลิก</button>
    </div>
</div>

<script>
/* ── WMO weather code map ── */
const WMO = {
    0:  { icon:'☀️',  th:'ท้องฟ้าแจ่มใส' },
    1:  { icon:'🌤️', th:'แจ่มใสเป็นส่วนใหญ่' },
    2:  { icon:'⛅',  th:'มีเมฆบางส่วน' },
    3:  { icon:'☁️',  th:'มีเมฆมาก' },
    45: { icon:'🌫️', th:'หมอกลง' },
    48: { icon:'🌫️', th:'หมอกเกาะน้ำแข็ง' },
    51: { icon:'🌦️', th:'ฝนปรอยเบา' },
    53: { icon:'🌦️', th:'ฝนปรอย' },
    55: { icon:'🌧️', th:'ฝนปรอยหนัก' },
    61: { icon:'🌧️', th:'ฝนเบา' },
    63: { icon:'🌧️', th:'ฝนปานกลาง' },
    65: { icon:'🌧️', th:'ฝนหนัก' },
    71: { icon:'🌨️', th:'หิมะเบา' },
    73: { icon:'🌨️', th:'หิมะปานกลาง' },
    75: { icon:'❄️',  th:'หิมะหนัก' },
    77: { icon:'🌨️', th:'เกล็ดหิมะ' },
    80: { icon:'🌦️', th:'ฝนเป็นช่วงๆ เบา' },
    81: { icon:'🌦️', th:'ฝนเป็นช่วงๆ' },
    82: { icon:'⛈️',  th:'ฝนเป็นช่วงๆ หนัก' },
    85: { icon:'🌨️', th:'หิมะเป็นช่วงๆ' },
    86: { icon:'❄️',  th:'หิมะหนักเป็นช่วงๆ' },
    95: { icon:'⛈️',  th:'พายุฝนฟ้าคะนอง' },
    96: { icon:'⛈️',  th:'พายุพร้อมลูกเห็บ' },
    99: { icon:'⛈️',  th:'พายุรุนแรงพร้อมลูกเห็บ' },
};

/* ── Background gradients ── */
function getBackground(code, hour) {
    const night = hour < 6 || hour >= 18;
    if (code === 0 || code === 1) return night ? ['#1a1a2e','#0f3460'] : ['#f7971e','#e55d87'];
    if (code <= 3)  return night ? ['#2d3561','#4a4e69'] : ['#485563','#29323c'];
    if (code <= 48) return ['#8e9eab','#6b7a8d'];
    if (code >= 95) return ['#0f0c29','#302b63'];
    return ['#1565C0','#0277BD'];
}

/* ── UV helpers ── */
function uvInfo(val) {
    if (val <= 2)  return { label:'ต่ำ',      color:'#00b894' };
    if (val <= 5)  return { label:'ปานกลาง', color:'#fdcb6e' };
    if (val <= 7)  return { label:'สูง',      color:'#e17055' };
    if (val <= 10) return { label:'สูงมาก',  color:'#d63031' };
    return            { label:'อันตราย', color:'#6c5ce7' };
}

/* ── Wind direction ── */
function windDir(deg) {
    const d = ['เหนือ','NE','ตะวันออก','SE','ใต้','SW','ตะวันตก','NW'];
    return d[Math.round(deg / 45) % 8];
}

/* ── Thai helpers ── */
const THAI_DAYS   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
const THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function thaiDate(d) {
    return `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear() + 543}`;
}

function thaiTime(d) {
    return d.toLocaleTimeString('th', { hour:'2-digit', minute:'2-digit' });
}

function hourLabel(localISOStr) {
    const h = parseInt(localISOStr.slice(11, 13), 10);
    if (h === 0)  return 'เที่ยงคืน';
    if (h === 12) return 'เที่ยง';
    return `${h} น.`;
}

/* ── Local ISO (YYYY-MM-DDTHH:mm) from local time, for matching open-meteo times ── */
function localISO(now) {
    const pad = n => String(n).padStart(2, '0');
    return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:00`;
}

/* ── Fetch location name via Nominatim ── */
async function reverseGeocode(lat, lon) {
    try {
        const r = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=th`,
            { headers: { 'Accept-Language': 'th' } }
        );
        const j = await r.json();
        const a = j.address;
        return a.city || a.town || a.village || a.county || a.state_district || a.state || 'ตำแหน่งของคุณ';
    } catch { return 'ตำแหน่งของคุณ'; }
}

/* ── Fetch weather from Open-Meteo ── */
async function fetchWeather(lat, lon) {
    const p = new URLSearchParams({
        latitude:  lat,
        longitude: lon,
        current: [
            'temperature_2m','apparent_temperature','relative_humidity_2m',
            'precipitation','weather_code','wind_speed_10m','wind_direction_10m','uv_index'
        ].join(','),
        hourly: 'temperature_2m,precipitation_probability,weather_code,wind_speed_10m,relative_humidity_2m',
        daily: [
            'weather_code','temperature_2m_max','temperature_2m_min',
            'precipitation_probability_max','uv_index_max',
            'wind_speed_10m_max','sunrise','sunset'
        ].join(','),
        timezone:       'auto',
        forecast_days:  7,
        wind_speed_unit:'kmh',
        models:         'best_match',   // ECMWF IFS + best regional model
    });
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?${p}`);
    if (!r.ok) throw new Error(`Open-Meteo ${r.status}`);
    return r.json();
}

/* ── Render ── */
function render(data, locName) {
    const now  = new Date();
    const hour = now.getHours();
    const c    = data.current;
    const wmo  = WMO[c.weather_code] ?? { icon:'🌡️', th:'ไม่ทราบสภาพ' };
    const uv   = uvInfo(c.uv_index ?? 0);
    const bg   = getBackground(c.weather_code, hour);

    document.body.style.background = `linear-gradient(145deg, ${bg[0]} 0%, ${bg[1]} 100%)`;

    /* Hourly: find current hour in local-time strings returned by open-meteo */
    const nowISO  = localISO(now);
    let hStart    = data.hourly.time.findIndex(t => t >= nowISO);
    if (hStart < 0) hStart = 0;
    const hTimes  = data.hourly.time.slice(hStart, hStart + 24);
    const hTemps  = data.hourly.temperature_2m.slice(hStart, hStart + 24);
    const hRains  = data.hourly.precipitation_probability.slice(hStart, hStart + 24);
    const hCodes  = data.hourly.weather_code.slice(hStart, hStart + 24);

    const hourlyHTML = hTimes.map((t, i) => {
        const hw = WMO[hCodes[i]] ?? { icon:'🌡️' };
        return `
        <div class="h-item ${i === 0 ? 'now' : ''}">
            <div class="h-time">${i === 0 ? 'ตอนนี้' : hourLabel(t)}</div>
            <div class="h-icon">${hw.icon}</div>
            <div class="h-desc">${hw.th}</div>
            <div class="h-temp">${Math.round(hTemps[i])}°</div>
            <div class="h-rain">💧${hRains[i]}%</div>
        </div>`;
    }).join('');

    /* Daily */
    const dailyHTML = data.daily.time.map((t, i) => {
        const dw   = WMO[data.daily.weather_code[i]] ?? { icon:'🌡️' };
        const rain = data.daily.precipitation_probability_max[i] ?? 0;
        return `
        <div class="d-item" id="d-row-${i}" onclick="toggleDay(${i})">
            <div class="d-day">${i === 0 ? 'วันนี้' : THAI_DAYS[new Date(t+'T12:00').getDay()]}</div>
            <div class="d-icon">${dw.icon}</div>
            <div class="d-rainbar">
                <span style="font-size:11px;opacity:.6">💧</span>
                <div class="bar-bg"><div class="bar-fill" style="width:${rain}%"></div></div>
                <span class="d-rain-pct">ฝน ${rain}%</span>
            </div>
            <div class="d-temps">
                <div class="d-hi">${Math.round(data.daily.temperature_2m_max[i])}°</div>
                <div class="d-lo">${Math.round(data.daily.temperature_2m_min[i])}°</div>
            </div>
            <div class="d-chevron" id="chevron-${i}">›</div>
        </div>
        <div class="d-expand" id="d-expand-${i}"></div>`;
    }).join('');

    /* UV */
    const uvPct = Math.min(((c.uv_index ?? 0) / 11) * 100, 100).toFixed(1);

    /* Sunrise / Sunset */
    const srTime = data.daily.sunrise[0] ? thaiTime(new Date(data.daily.sunrise[0])) : '--:--';
    const ssTime = data.daily.sunset[0]  ? thaiTime(new Date(data.daily.sunset[0]))  : '--:--';

    document.getElementById('content').innerHTML = `
        <div class="header">
            <div class="location-name">${getSavedLocation() ? '📌' : '📍'} ${locName}</div>
            <div class="date-line">${thaiDate(now)} · อัปเดต ${thaiTime(now)}${getSavedLocation() ? ' · <span style="opacity:0.55">พิกัดกำหนดเอง</span>' : ''}</div>
        </div>

        <div class="glass current-card">
            <span class="wx-icon">${wmo.icon}</span>
            <div class="temp-display">${Math.round(c.temperature_2m)}<sup>°C</sup></div>
            <div class="wx-label">${wmo.th}</div>
            <div class="feels">รู้สึกเหมือน ${Math.round(c.apparent_temperature)}°C</div>
            <div class="stats-grid">
                <div class="stat">
                    <div class="stat-icon">💧</div>
                    <div class="stat-val">${c.relative_humidity_2m}%</div>
                    <div class="stat-lbl">ความชื้น</div>
                </div>
                <div class="stat">
                    <div class="stat-icon">💨</div>
                    <div class="stat-val">${Math.round(c.wind_speed_10m)} km/h</div>
                    <div class="stat-lbl">ลม${windDir(c.wind_direction_10m)}</div>
                </div>
                <div class="stat">
                    <div class="stat-icon">🌧️</div>
                    <div class="stat-val">${c.precipitation} mm</div>
                    <div class="stat-lbl">ฝนสะสม</div>
                </div>
                <div class="stat">
                    <div class="stat-icon">🔆</div>
                    <div class="stat-val" style="color:${uv.color}">${uv.label}</div>
                    <div class="stat-lbl">UV ${(c.uv_index ?? 0).toFixed(1)}</div>
                </div>
            </div>
        </div>

        <div class="section-title">รายชั่วโมง · 24 ชม. ข้างหน้า</div>
        <div class="hourly-scroll">
            <div class="hourly-row">${hourlyHTML}</div>
        </div>

        <div class="section-title">พยากรณ์ 7 วัน</div>
        <div class="glass daily-card">${dailyHTML}</div>

        <div class="extras-grid">
            <div class="glass extra-card">
                <div class="ex-title">☀️ UV Index</div>
                <div class="ex-val" style="color:${uv.color}">${(c.uv_index ?? 0).toFixed(1)}</div>
                <div class="ex-sub">${uv.label}</div>
                <div class="uv-bar"><div class="uv-dot" style="left:${uvPct}%"></div></div>
            </div>
            <div class="glass extra-card">
                <div class="ex-title">🌅 แสงแดดวันนี้</div>
                <div class="sun-row">
                    <div class="sun-item">
                        <div style="font-size:20px">🌄</div>
                        <div class="sun-time">${srTime}</div>
                        <div class="sun-lbl">ขึ้น</div>
                    </div>
                    <div style="opacity:.4; font-size:18px">→</div>
                    <div class="sun-item">
                        <div style="font-size:20px">🌇</div>
                        <div class="sun-time">${ssTime}</div>
                        <div class="sun-lbl">ตก</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="model-badge">
            ⚡ Open-Meteo · ECMWF best_match · แม่นยำสูงสุดสำหรับพยากรณ์ 7 วัน
        </div>

        <button class="refresh-btn" onclick="loadWeather()">🔄 รีโหลดข้อมูล</button>
    `;
    _weatherCache = data;
    _openDay = null;
    toggleDay(0);
}

/* ── State ── */
let _weatherCache = null;
let _openDay      = null;

/* ── Hourly drill-down ── */
function toggleDay(i) {
    if (!_weatherCache) return;

    if (_openDay !== null && _openDay !== i) {
        document.getElementById(`d-expand-${_openDay}`)?.classList.remove('open');
        document.getElementById(`d-row-${_openDay}`)?.classList.remove('open');
    }

    if (_openDay === i) {
        document.getElementById(`d-expand-${i}`)?.classList.remove('open');
        document.getElementById(`d-row-${i}`)?.classList.remove('open');
        _openDay = null;
        return;
    }

    _openDay = i;
    const expand = document.getElementById(`d-expand-${i}`);
    const row    = document.getElementById(`d-row-${i}`);
    if (!expand) return;
    expand.innerHTML = buildDayHourly(_weatherCache, i);
    expand.classList.add('open');
    row.classList.add('open');
}

function buildDayHourly(data, dayIndex) {
    const now    = new Date();
    const start  = dayIndex * 24;
    const times  = data.hourly.time.slice(start, start + 24);
    const temps  = data.hourly.temperature_2m.slice(start, start + 24);
    const rains  = data.hourly.precipitation_probability.slice(start, start + 24);
    const codes  = data.hourly.weather_code.slice(start, start + 24);
    const winds  = data.hourly.wind_speed_10m.slice(start, start + 24);
    const hums   = data.hourly.relative_humidity_2m.slice(start, start + 24);
    const nowISO = localISO(now);

    const items = times.map((t, i) => {
        const hw       = WMO[codes[i]] ?? { icon: '🌡️' };
        const isCur    = dayIndex === 0 && t === nowISO;
        const h        = parseInt(t.slice(11, 13), 10);
        const label    = h === 0 ? 'เที่ยงคืน' : h === 12 ? 'เที่ยง' : `${h} น.`;
        return `
        <div class="dh-item${isCur ? ' current-h' : ''}">
            <div class="dh-time">${label}</div>
            <div class="dh-icon">${hw.icon}</div>
            <div class="dh-temp">${Math.round(temps[i])}°</div>
            <div class="dh-rain">💧${rains[i]}%</div>
            <div class="dh-wind">💨${Math.round(winds[i])}</div>
            <div class="dh-hum">💦${hums[i]}%</div>
        </div>`;
    }).join('');

    return `<div class="dh-scroll"><div class="dh-row">${items}</div></div>`;
}

/* ── Location storage ── */
const LS = { lat: 'wx_lat', lon: 'wx_lon', name: 'wx_name' };

function getSavedLocation() {
    const p = new URLSearchParams(location.search);
    if (p.has('lat') && p.has('lon')) {
        return { lat: parseFloat(p.get('lat')), lon: parseFloat(p.get('lon')), name: p.get('name') || null };
    }
    const lat = localStorage.getItem(LS.lat);
    const lon = localStorage.getItem(LS.lon);
    if (lat && lon) {
        return { lat: parseFloat(lat), lon: parseFloat(lon), name: localStorage.getItem(LS.name) || null };
    }
    return null;
}

function saveLocation(lat, lon, name) {
    localStorage.setItem(LS.lat,  String(lat));
    localStorage.setItem(LS.lon,  String(lon));
    localStorage.setItem(LS.name, name || '');
}

function clearSavedLocation() {
    [LS.lat, LS.lon, LS.name].forEach(k => localStorage.removeItem(k));
}

/* ── Modal ── */
function openModal() {
    const saved = getSavedLocation();
    document.getElementById('inp-lat').value  = saved?.lat  ?? '';
    document.getElementById('inp-lon').value  = saved?.lon  ?? '';
    document.getElementById('inp-name').value = saved?.name ?? '';
    const badge = document.getElementById('saved-badge');
    if (saved) {
        badge.textContent = saved.name
            ? `กำลังใช้: ${saved.name}`
            : `กำลังใช้พิกัด: ${saved.lat.toFixed(4)}, ${saved.lon.toFixed(4)}`;
        badge.style.display = 'block';
    } else {
        badge.style.display = 'none';
    }
    document.getElementById('modal').classList.add('open');
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
}

function saveAndLoad() {
    const lat  = parseFloat(document.getElementById('inp-lat').value);
    const lon  = parseFloat(document.getElementById('inp-lon').value);
    const name = document.getElementById('inp-name').value.trim();
    if (isNaN(lat) || lat < -90  || lat > 90)  { alert('Latitude ต้องอยู่ระหว่าง -90 ถึง 90');   return; }
    if (isNaN(lon) || lon < -180 || lon > 180) { alert('Longitude ต้องอยู่ระหว่าง -180 ถึง 180'); return; }
    saveLocation(lat, lon, name);
    closeModal();
    loadWeather();
}

function useGPS() {
    clearSavedLocation();
    closeModal();
    loadWeather();
}

/* ── Main ── */
async function loadWeather() {
    const loading = document.getElementById('loading');
    const content = document.getElementById('content');
    loading.style.display = 'flex';
    loading.innerHTML = `
        <div class="spinner"></div>
        <p>กำลังระบุตำแหน่ง...</p>
        <p class="loading-sub">กรุณาอนุญาตการเข้าถึง GPS</p>
    `;
    content.style.display = 'none';

    try {
        const saved = getSavedLocation();
        let lat, lon, locName;

        if (saved) {
            lat = saved.lat;
            lon = saved.lon;
            loading.querySelector('p').textContent = 'กำลังดึงข้อมูลอากาศ...';
            const [weatherData, resolvedName] = await Promise.all([
                fetchWeather(lat, lon),
                saved.name ? Promise.resolve(saved.name) : reverseGeocode(lat, lon),
            ]);
            locName = resolvedName;
            render(weatherData, locName);
        } else {
            const pos = await new Promise((res, rej) =>
                navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 12000 })
            );
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
            loading.querySelector('p').textContent = 'กำลังดึงข้อมูลอากาศ...';
            const [weatherData, resolvedName] = await Promise.all([
                fetchWeather(lat, lon),
                reverseGeocode(lat, lon),
            ]);
            locName = resolvedName;
            render(weatherData, locName);
        }

        loading.style.display = 'none';
        content.style.display = 'block';

    } catch (err) {
        let msg = err.message;
        if (err.code === 1) msg = 'ไม่ได้รับอนุญาตเข้าถึง GPS — กรุณาอนุญาตในเบราว์เซอร์';
        if (err.code === 2) msg = 'หาตำแหน่งไม่พบ — ลองใหม่อีกครั้ง';
        if (err.code === 3) msg = 'หมดเวลาค้นหาตำแหน่ง — ตรวจสอบสัญญาณ GPS';
        loading.innerHTML = `
            <div class="error-box">
                <div style="font-size:40px">⚠️</div>
                <p style="font-size:16px; font-weight:600; margin-top:4px">โหลดข้อมูลไม่สำเร็จ</p>
                <p>${msg}</p>
                <button class="refresh-btn" style="margin-top:16px; max-width:200px" onclick="loadWeather()">ลองใหม่</button>
            </div>
        `;
    }
}

loadWeather();
</script>
